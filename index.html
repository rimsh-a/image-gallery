<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture The Moment</title>

    <link rel="stylesheet" href="assests/css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Capture The Moment</h1>
        <p>Modern Responsive Image Gallery with Filters & Lightbox</p>
    </section>

    <!-- Filter Buttons -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="card nature">
            <img src="https://picsum.photos/id/10/600/400">
            <div class="overlay">
                <h3>Nature</h3>
            </div>
        </div>

        <div class="card city">
            <img src="https://picsum.photos/id/1011/600/400">
            <div class="overlay">
                <h3>City</h3>
            </div>
        </div>

        <div class="card animals">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQc6CKUAPqE1XrIWw5TNBYAHJx2236onEAOWw&s">
            <div class="overlay">
                <h3>Animals</h3>
            </div>
        </div>

        <div class="card nature">
            <img src="https://picsum.photos/id/1039/600/400">
            <div class="overlay">
                <h3>Mountains</h3>
            </div>
        </div>

        <div class="card city">
            <img src="https://picsum.photos/id/1043/600/400">
            <div class="overlay">
                <h3>Urban Life</h3>
            </div>
        </div>
        <div class="card city">
            <img src="https://picsum.photos/id/1043/600/400">
            <div class="overlay">
                <h3>Urban Life</h3>
            </div>
        </div>

        
        <div class="gallery">

        <div class="card nature">
            <img src="https://cdn.wallpapersafari.com/73/12/zsV4wB.jpg">
            <div class="overlay">
                <h3>Nature</h3>
            </div>
        </div>
         

    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close">&times;</span>

        <button id="prev">❮</button>

        <img id="lightbox-img">

        <button id="next">❯</button>
    </div>

    <script src="assests/js/script.js"></script>

</body>
</html>
